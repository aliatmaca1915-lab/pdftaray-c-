<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Tarayıcı</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tarayıcı">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3143/3143460.png">

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        #view-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; }
        video, canvas { max-width: 100%; max-height: 100%; position: absolute; }
        canvas { z-index: 10; display: none; }
        #controls { height: 80px; background: #1e1e1e; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; background: #0a84ff; color: white; font-size: 16px; cursor: pointer; opacity: 0.5; pointer-events: none; }
        button.active { opacity: 1; pointer-events: auto; }
        button.danger { background: #ff453a; }
        button.success { background: #32d74b; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; z-index: 20; font-size: 12px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="view-area">
        <div id="status">Sistem Hazırlanıyor...</div>
        <video id="camera" autoplay playsinline></video>
        <canvas id="canvasOutput"></canvas>
    </div>
    
    <div id="controls">
        <button id="btn-capture">Fotoğraf Çek</button>
        <button id="btn-scan" class="success" style="display:none;">Kağıdı Bul ve Tara</button>
        <button id="btn-pdf" class="danger" style="display:none;">PDF İndir</button>
        <button id="btn-retake" style="display:none;">İptal</button>
    </div>
</div>

<script>
    let video = document.getElementById('camera');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d');
    let statusDiv = document.getElementById('status');
    
    let btnCapture = document.getElementById('btn-capture');
    let btnScan = document.getElementById('btn-scan');
    let btnPdf = document.getElementById('btn-pdf');
    let btnRetake = document.getElementById('btn-retake');

    let isCameraReady = false;
    let isOpenCvReady = false;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            video.srcObject = stream;
            isCameraReady = true;
            checkReadyState();
        } catch (err) {
            statusDiv.innerText = "Kamera hatası!";
        }
    }

    window.Module = {
        onRuntimeInitialized: function() {
            isOpenCvReady = true;
            statusDiv.innerText = "Sistem Hazır. Kamerayı kağıda tutun.";
            checkReadyState();
        }
    };

    function checkReadyState() {
        if (isCameraReady && isOpenCvReady) {
            btnCapture.classList.add('active');
        }
    }

    btnCapture.addEventListener('click', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        video.style.display = 'none';
        canvas.style.display = 'block';
        
        btnCapture.style.display = 'none';
        btnScan.style.display = 'block';
        btnRetake.style.display = 'block';
        btnScan.classList.add('active');
        btnRetake.classList.add('active');
    });

    // İŞTE SİHRİN GERÇEKLEŞTİĞİ YENİ ALGORİTMA
    btnScan.addEventListener('click', () => {
        statusDiv.innerText = "Kağıt Aranıyor...";
        setTimeout(() => {
            try {
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                
                // Pürüzleri gizle
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                
                // Kenarları (Çizgileri) bul
                let edges = new cv.Mat();
                cv.Canny(gray, edges, 75, 200, 3, false);
                
                // Şekilleri (Konturları) çıkart
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                // En büyük alanı (kağıdı) bul
                let maxArea = 0;
                let maxContour = null;
                
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    if (area > maxArea && area > 50000) { // Çok küçük çöpleri yoksay
                        maxArea = area;
                        maxContour = cnt;
                    }
                }
                
                let finalImage = new cv.Mat();
                
                if (maxContour !== null) {
                    // KAĞIT BULUNDU! Sadece kağıdın olduğu alanı kırp (Bacakları ve masayı at)
                    statusDiv.innerText = "Kağıt Bulundu! Düzeltiliyor...";
                    let rect = cv.boundingRect(maxContour);
                    let cropped = src.roi(rect);
                    
                    // Kırpılmış kağıda filtreyi uygula
                    cv.cvtColor(cropped, finalImage, cv.COLOR_RGBA2GRAY, 0);
                    cv.adaptiveThreshold(finalImage, finalImage, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 11, 2);
                    
                    // Kırpılan resmin boyutunu canvasa uyarla
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                    cropped.delete();
                } else {
                    // KAĞIT BULUNAMAZSA (Örn: beyaz masada beyaz kağıt) eski sisteme dön
                    statusDiv.innerText = "Kağıt sınırları tam bulunamadı. Filtre uygulanıyor.";
                    cv.cvtColor(src, finalImage, cv.COLOR_RGBA2GRAY, 0);
                    cv.adaptiveThreshold(finalImage, finalImage, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 11, 2);
                }
                
                cv.imshow('canvasOutput', finalImage);
                
                // Hafızayı temizle (Safari çökmesin diye çok önemli)
                src.delete(); gray.delete(); edges.delete(); contours.delete(); hierarchy.delete(); finalImage.delete();
                
                statusDiv.innerText = "Tarama Başarılı!";
                btnScan.style.display = 'none';
                btnPdf.style.display = 'block';
                btnPdf.classList.add('active');
            } catch (err) {
                statusDiv.innerText = "İşlem Hatası: Lütfen tekrar çekin.";
            }
        }, 100);
    });

    btnPdf.addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const imgData = canvas.toDataURL("image/jpeg", 0.8);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        
        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
        pdf.save("taranan_belge.pdf");
    });

    btnRetake.addEventListener('click', () => {
        video.style.display = 'block';
        canvas.style.display = 'none';
        btnCapture.style.display = 'block';
        btnScan.style.display = 'none';
        btnPdf.style.display = 'none';
        btnRetake.style.display = 'none';
        statusDiv.innerText = "Hazır.";
    });

    startCamera();
</script>
</body>
</html>
