<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Tarayıcı</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tarayıcı">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3143/3143460.png">

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        #view-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; }
        video, canvas { max-width: 100%; max-height: 100%; position: absolute; }
        canvas { z-index: 10; display: none; }
        #controls { height: 80px; background: #1e1e1e; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; background: #0a84ff; color: white; font-size: 16px; cursor: pointer; opacity: 0.5; pointer-events: none; }
        button.active { opacity: 1; pointer-events: auto; }
        button.danger { background: #ff453a; }
        button.success { background: #32d74b; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; z-index: 20; font-size: 12px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="view-area">
        <div id="status">Sistem Hazırlanıyor...</div>
        <video id="camera" autoplay playsinline></video>
        <canvas id="canvasOutput"></canvas>
    </div>
    
    <div id="controls">
        <button id="btn-capture">Fotoğraf Çek</button>
        <button id="btn-scan" class="success" style="display:none;">4 Köşeyi Bul & Tara</button>
        <button id="btn-pdf" class="danger" style="display:none;">PDF İndir</button>
        <button id="btn-retake" style="display:none;">İptal</button>
    </div>
</div>

<script>
    let video = document.getElementById('camera');
    let canvas = document.getElementById('canvasOutput');
    let ctx = canvas.getContext('2d');
    let statusDiv = document.getElementById('status');
    
    let btnCapture = document.getElementById('btn-capture');
    let btnScan = document.getElementById('btn-scan');
    let btnPdf = document.getElementById('btn-pdf');
    let btnRetake = document.getElementById('btn-retake');

    let isCameraReady = false;
    let isOpenCvReady = false;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            video.srcObject = stream;
            isCameraReady = true;
            checkReadyState();
        } catch (err) {
            statusDiv.innerText = "Kamera hatası!";
        }
    }

    window.Module = {
        onRuntimeInitialized: function() {
            isOpenCvReady = true;
            statusDiv.innerText = "Sistem Hazır. Kamerayı kağıda tutun.";
            checkReadyState();
        }
    };

    function checkReadyState() {
        if (isCameraReady && isOpenCvReady) {
            btnCapture.classList.add('active');
        }
    }

    btnCapture.addEventListener('click', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        video.style.display = 'none';
        canvas.style.display = 'block';
        
        btnCapture.style.display = 'none';
        btnScan.style.display = 'block';
        btnRetake.style.display = 'block';
        btnScan.classList.add('active');
        btnRetake.classList.add('active');
    });

    btnScan.addEventListener('click', () => {
        statusDiv.innerText = "Perspektif Hesaplanıyor...";
        setTimeout(() => {
            try {
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                
                let edges = new cv.Mat();
                cv.Canny(gray, edges, 75, 200, 3, false);
                
                // Kırık çizgileri birleştirmek için kalınlaştırma (Dilation)
                let M_dilate = cv.Mat.ones(3, 3, cv.CV_8U);
                cv.dilate(edges, edges, M_dilate, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                let maxArea = 0;
                let docContour = null;
                
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    
                    if (area > 50000) { 
                        let peri = cv.arcLength(cnt, true);
                        let approx = new cv.Mat();
                        // Şekli köşegenlere yuvarla
                        cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                        
                        // SADECE 4 KÖŞELİ ŞEKİLLERİ KABUL ET
                        if (approx.rows === 4 && area > maxArea) {
                            maxArea = area;
                            if (docContour) docContour.delete();
                            docContour = approx.clone();
                        }
                        approx.delete();
                    }
                }
                
                let finalImage = new cv.Mat();
                
                if (docContour !== null) {
                    statusDiv.innerText = "4 Köşe Bulundu! Düzeltiliyor...";
                    
                    // 4 Köşenin Koordinatlarını Al ve Sırala
                    let pts = [];
                    for (let i = 0; i < 4; i++) {
                        pts.push({x: docContour.data32S[i*2], y: docContour.data32S[i*2+1]});
                    }
                    
                    // Toplama ve çıkarma matematiksel mantığıyla köşeleri belirle
                    pts.sort((a, b) => (a.x + a.y) - (b.x + b.y));
                    let tl = pts[0]; // Sol-Üst
                    let br = pts[3]; // Sağ-Alt
                    
                    let rem = [pts[1], pts[2]];
                    rem.sort((a, b) => (a.y - a.x) - (b.y - b.x));
                    let tr = rem[0]; // Sağ-Üst
                    let bl = rem[1]; // Sol-Alt
                    
                    // Yeni Kağıdın Gerçek Boyutlarını (Genişlik/Yükseklik) Hesapla
                    let widthA = Math.hypot(br.x - bl.x, br.y - bl.y);
                    let widthB = Math.hypot(tr.x - tl.x, tr.y - tl.y);
                    let maxWidth = Math.max(widthA, widthB);
                    
                    let heightA = Math.hypot(tr.x - br.x, tr.y - br.y);
                    let heightB = Math.hypot(tl.x - bl.x, tl.y - bl.y);
                    let maxHeight = Math.max(heightA, heightB);
                    
                    // Sihirli Matematik: Eski yamuk köşeleri, yeni düz köşelere eşle
                    let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                    let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight]);
                    
                    let M = cv.getPerspectiveTransform(srcTri, dstTri);
                    let warped = new cv.Mat();
                    let dsize = new cv.Size(maxWidth, maxHeight);
                    
                    // Görüntüyü Sündür (Perspektifi Düzelt)
                    cv.warpPerspective(src, warped, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
                    
                    // Temiz Siyah/Beyaz Filtreyi Uygula
                    cv.cvtColor(warped, finalImage, cv.COLOR_RGBA2GRAY, 0);
                    cv.GaussianBlur(finalImage, finalImage, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                    cv.adaptiveThreshold(finalImage, finalImage, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 25, 15);
                    
                    canvas.width = maxWidth;
                    canvas.height = maxHeight;
                    
                    // Hafıza temizliği
                    srcTri.delete(); dstTri.delete(); M.delete(); warped.delete(); docContour.delete();
                } else {
                    statusDiv.innerText = "4 net köşe bulunamadı, varsayılan tarama.";
                    cv.cvtColor(src, finalImage, cv.COLOR_RGBA2GRAY, 0);
                    cv.GaussianBlur(finalImage, finalImage, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                    cv.adaptiveThreshold(finalImage, finalImage, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 25, 15);
                }
                
                cv.imshow('canvasOutput', finalImage);
                
                // Genel hafıza temizliği
                src.delete(); gray.delete(); edges.delete(); M_dilate.delete(); contours.delete(); hierarchy.delete(); finalImage.delete();
                
                statusDiv.innerText = "Tarama Başarılı!";
                btnScan.style.display = 'none';
                btnPdf.style.display = 'block';
                btnPdf.classList.add('active');
            } catch (err) {
                statusDiv.innerText = "İşlem Hatası: " + err;
            }
        }, 100);
    });

    btnPdf.addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const imgData = canvas.toDataURL("image/jpeg", 0.8);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        
        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
        pdf.save("taranan_belge.pdf");
    });

    btnRetake.addEventListener('click', () => {
        video.style.display = 'block';
        canvas.style.display = 'none';
        btnCapture.style.display = 'block';
        btnScan.style.display = 'none';
        btnPdf.style.display = 'none';
        btnRetake.style.display = 'none';
        statusDiv.innerText = "Hazır.";
    });

    startCamera();
</script>
</body>
</html>
