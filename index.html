<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Tarayıcı</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tarayıcı">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3143/3143460.png">

    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        #view-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        video { max-width: 100%; max-height: 100%; position: absolute; object-fit: contain; }
        canvas { max-width: 100%; max-height: 100%; position: absolute; object-fit: contain; z-index: 10; display: none; touch-action: none; }
        
        #controls { height: 80px; background: #1e1e1e; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; z-index: 20; }
        button { padding: 12px 18px; border: none; border-radius: 8px; font-weight: bold; background: #0a84ff; color: white; font-size: 15px; cursor: pointer; display: none; }
        button.active { display: block; }
        button.danger { background: #ff453a; }
        button.success { background: #32d74b; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; z-index: 30; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="view-area">
        <div id="status">Sistem Hazırlanıyor...</div>
        <video id="camera" autoplay playsinline></video>
        <canvas id="uiCanvas"></canvas>
        <canvas id="sourceCanvas" style="display:none;"></canvas>
    </div>
    
    <div id="controls">
        <button id="btn-capture" class="active" style="opacity: 0.5; pointer-events: none;">Fotoğraf Çek</button>
        <button id="btn-crop" class="success">Kes ve Filtrele</button>
        <button id="btn-pdf" class="danger">PDF İndir</button>
        <button id="btn-retake">İptal</button>
    </div>
</div>

<script>
    let video = document.getElementById('camera');
    let uiCanvas = document.getElementById('uiCanvas');
    let ctx = uiCanvas.getContext('2d');
    let sourceCanvas = document.getElementById('sourceCanvas');
    let sourceCtx = sourceCanvas.getContext('2d');
    let statusDiv = document.getElementById('status');
    
    let btnCapture = document.getElementById('btn-capture');
    let btnCrop = document.getElementById('btn-crop');
    let btnPdf = document.getElementById('btn-pdf');
    let btnRetake = document.getElementById('btn-retake');

    let isCameraReady = false;
    let isOpenCvReady = false;

    // Kırpma köşeleri (Sol Üst, Sağ Üst, Sağ Alt, Sol Alt)
    let corners = [];
    let activeCorner = null;
    let currentImage = null;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            video.srcObject = stream;
            isCameraReady = true;
            checkReadyState();
        } catch (err) {
            statusDiv.innerText = "Kamera hatası!";
        }
    }

    window.Module = {
        onRuntimeInitialized: function() {
            isOpenCvReady = true;
            statusDiv.innerText = "Sistem Hazır. Kamerayı kağıda tutun.";
            checkReadyState();
        }
    };

    function checkReadyState() {
        if (isCameraReady && isOpenCvReady) {
            btnCapture.style.opacity = "1";
            btnCapture.style.pointerEvents = "auto";
        }
    }

    // 1. AŞAMA: FOTOĞRAF ÇEK VE NOKTALARI YERLEŞTİR
    btnCapture.addEventListener('click', () => {
        // Çözünürlüğü al
        const w = video.videoWidth;
        const h = video.videoHeight;
        
        uiCanvas.width = w;
        uiCanvas.height = h;
        sourceCanvas.width = w;
        sourceCanvas.height = h;

        // Resmi çiz
        sourceCtx.drawImage(video, 0, 0, w, h);
        
        // Başlangıç noktalarını (köşeleri) belirle (Resmin biraz içine)
        let offset = Math.min(w, h) * 0.2;
        corners = [
            { x: offset, y: offset },             // Sol Üst
            { x: w - offset, y: offset },         // Sağ Üst
            { x: w - offset, y: h - offset },     // Sağ Alt
            { x: offset, y: h - offset }          // Sol Alt
        ];

        video.style.display = 'none';
        uiCanvas.style.display = 'block';
        
        btnCapture.classList.remove('active');
        btnCrop.classList.add('active');
        btnRetake.classList.add('active');
        
        statusDiv.innerText = "Mavi noktaları kağıdın köşelerine sürükleyin.";
        drawUI();
    });

    // --- DOKUNMATİK EKRAN (SÜRÜKLEME) KONTROLLERİ ---
    function getTouchPos(e) {
        let rect = uiCanvas.getBoundingClientRect();
        let scaleX = uiCanvas.width / rect.width;
        let scaleY = uiCanvas.height / rect.height;
        return {
            x: (e.touches[0].clientX - rect.left) * scaleX,
            y: (e.touches[0].clientY - rect.top) * scaleY
        };
    }

    uiCanvas.addEventListener('touchstart', (e) => {
        e.preventDefault(); // Ekranın kaymasını engelle
        let pos = getTouchPos(e);
        // Dokunulan yere en yakın köşeyi bul (Büyük parmaklar için tolerans alanı geniş: 150px)
        let hitRadius = 150; 
        for (let i = 0; i < corners.length; i++) {
            let dx = pos.x - corners[i].x;
            let dy = pos.y - corners[i].y;
            if (dx * dx + dy * dy < hitRadius * hitRadius) {
                activeCorner = i;
                break;
            }
        }
    }, {passive: false});

    uiCanvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (activeCorner !== null) {
            let pos = getTouchPos(e);
            corners[activeCorner].x = pos.x;
            corners[activeCorner].y = pos.y;
            drawUI();
        }
    }, {passive: false});

    uiCanvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        activeCorner = null;
    }, {passive: false});

    function drawUI() {
        // Orijinal resmi ekrana bas
        ctx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
        ctx.drawImage(sourceCanvas, 0, 0);

        // Çerçeveyi çiz (Mavi Çizgiler)
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);
        ctx.lineTo(corners[1].x, corners[1].y);
        ctx.lineTo(corners[2].x, corners[2].y);
        ctx.lineTo(corners[3].x, corners[3].y);
        ctx.closePath();
        ctx.lineWidth = uiCanvas.width * 0.005;
        ctx.strokeStyle = 'rgba(10, 132, 255, 0.8)';
        ctx.stroke();
        ctx.fillStyle = 'rgba(10, 132, 255, 0.2)';
        ctx.fill();

        // Noktaları (Köşeleri) çiz
        ctx.fillStyle = '#0a84ff';
        corners.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, uiCanvas.width * 0.02, 0, 2 * Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
        });
    }

    // 2. AŞAMA: KES, DÜZELT VE FİLTRELE (Gerçek CamScanner Sihri)
    btnCrop.addEventListener('click', () => {
        statusDiv.innerText = "İşleniyor...";
        setTimeout(() => {
            try {
                let src = cv.imread(sourceCanvas);
                
                // Kağıdın düzeltildikten sonraki yeni boyutu (A4 oranına yakın)
                let maxWidth = Math.max(
                    Math.hypot(corners[0].x - corners[1].x, corners[0].y - corners[1].y),
                    Math.hypot(corners[2].x - corners[3].x, corners[2].y - corners[3].y)
                );
                let maxHeight = Math.max(
                    Math.hypot(corners[0].x - corners[3].x, corners[0].y - corners[3].y),
                    Math.hypot(corners[1].x - corners[2].x, corners[1].y - corners[2].y)
                );

                // Matematiksel köşe eşleşmeleri
                let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
                    corners[0].x, corners[0].y, // Sol üst
                    corners[1].x, corners[1].y, // Sağ üst
                    corners[2].x, corners[2].y, // Sağ alt
                    corners[3].x, corners[3].y  // Sol alt
                ]);
                let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
                    0, 0, 
                    maxWidth, 0, 
                    maxWidth, maxHeight, 
                    0, maxHeight
                ]);

                // Perspektifi düzelt (Yamuk kağıdı düz A4 yap)
                let M = cv.getPerspectiveTransform(srcTri, dstTri);
                let warped = new cv.Mat();
                cv.warpPerspective(src, warped, M, new cv.Size(maxWidth, maxHeight));

                // Siyah-Beyaz Temizleme Filtresi (Sadece düzeltilmiş kağıda)
                cv.cvtColor(warped, warped, cv.COLOR_RGBA2GRAY, 0);
                cv.adaptiveThreshold(warped, warped, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 15, 5);

                // Sonucu canvas'a bas
                uiCanvas.width = maxWidth;
                uiCanvas.height = maxHeight;
                cv.imshow('uiCanvas', warped);

                // Hafızayı temizle
                src.delete(); srcTri.delete(); dstTri.delete(); M.delete(); warped.delete();
                
                statusDiv.innerText = "Tarama Başarılı!";
                btnCrop.classList.remove('active');
                btnPdf.classList.add('active');
            } catch (err) {
                statusDiv.innerText = "Hata oluştu, tekrar deneyin.";
            }
        }, 100);
    });

    // 3. AŞAMA: PDF OLUŞTUR
    btnPdf.addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const imgData = uiCanvas.toDataURL("image/jpeg", 0.9);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (uiCanvas.height * pdfWidth) / uiCanvas.width;
        
        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
        pdf.save("taranan_belge.pdf");
    });

    // İPTAL ET VE BAŞA DÖN
    btnRetake.addEventListener('click', () => {
        video.style.display = 'block';
        uiCanvas.style.display = 'none';
        btnCapture.classList.add('active');
        btnCrop.classList.remove('active');
        btnPdf.classList.remove('active');
        btnRetake.classList.remove('active');
        statusDiv.innerText = "Kamerayı kağıda tutun.";
    });

    startCamera();
</script>
</body>
</html>
